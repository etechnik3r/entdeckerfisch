<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- App-Icon des Entdeckerfischs: ein fröhlicher oranger Fisch,
       der durch blaues Wasser nach OBEN schwimmt (wie im Spiel!).
       Als SVG gezeichnet, damit es auf jedem Handy scharf bleibt. -->
  <defs>
    <linearGradient id="wasser" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3fa9f5"/>
      <stop offset="1" stop-color="#0a4d8c"/>
    </linearGradient>
  </defs>

  <!-- Blauer Wasser-Hintergrund (füllt das ganze Icon – maskable-tauglich) -->
  <rect width="100" height="100" fill="url(#wasser)"/>

  <!-- Kleine Luftblasen, die neben dem Fisch aufsteigen -->
  <circle cx="26" cy="30" r="3.2" fill="none" stroke="#dff3ff" stroke-width="1.6" opacity="0.85"/>
  <circle cx="20" cy="46" r="2.2" fill="none" stroke="#dff3ff" stroke-width="1.4" opacity="0.7"/>
  <circle cx="76" cy="24" r="2.6" fill="none" stroke="#dff3ff" stroke-width="1.5" opacity="0.8"/>
  <circle cx="80" cy="42" r="1.8" fill="none" stroke="#dff3ff" stroke-width="1.3" opacity="0.6"/>

  <!-- Der Fisch (schwimmt nach oben) -->
  <g transform="translate(50 54)">
    <!-- Schwanzflosse -->
    <path d="M0 22 L-13 40 Q0 33 13 40 Z" fill="#ff9f43"/>
    <!-- Körper -->
    <ellipse cx="0" cy="0" rx="19" ry="27" fill="#ffb35c"/>
    <!-- Heller Bauch -->
    <ellipse cx="5" cy="4" rx="11" ry="19" fill="#ffd9a0"/>
    <!-- Seitenflossen -->
    <path d="M-17 4 Q-30 8 -26 18 Q-19 14 -14 10 Z" fill="#ff9f43"/>
    <path d="M17 4 Q30 8 26 18 Q19 14 14 10 Z" fill="#ff9f43"/>
    <!-- Auge (schaut neugierig nach oben) -->
    <circle cx="-6" cy="-13" r="6" fill="#ffffff"/>
    <circle cx="-6" cy="-15" r="3" fill="#22303c"/>
    <circle cx="-4.8" cy="-16.2" r="1" fill="#ffffff"/>
    <!-- Fröhlicher Mund -->
    <path d="M-13 -4 Q-9 0 -4 -2" fill="none" stroke="#8a4b12" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Schuppen-Bögen -->
    <path d="M4 -8 q5 4 3 10" fill="none" stroke="#f09030" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M9 -2 q4 4 2 9" fill="none" stroke="#f09030" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
